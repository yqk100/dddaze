name: develop

on:
  pull_request:
    types:
      - opened
  push:

jobs:
  develop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Make
        run: |
          bash cmd/develop.sh
      - name: Test
        run: |
          go test -v -p 1 ./...
